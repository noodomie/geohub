<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GeoHub - Multiplayer Cyber Arena</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.0/nipplejs.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <div id="landscape-warning">
    <div class="warning-box">
      <div class="rotate-phone-icon">📱</div>
      <h2>Yatay Mod Gerekli!</h2>
      <p>Lütfen dikey kilidini açıp cihazınızı <strong>Yatay (Landscape)</strong> konuma çevirin.</p>
    </div>
  </div>

  <div id="login-container">
    <div class="login-card">
      <h1 class="logo-text">GeoHub</h1>
      <p class="subtitle">Multiplayer Arena</p>
      <input type="text" id="username-input" placeholder="kullanıcı adı yazın..." autocomplete="off" maxlength="12">
      <button id="join-btn">KAYDOL VE KATIL</button>
      <div id="login-error" class="error-msg"></div>
    </div>
  </div>

  <div id="game-container">
    <div id="canvas-container"></div>

    <div id="my-hud">
      <div class="hud-item"><span class="icon">👤</span> <span id="hud-name">-</span></div>
      <div class="hud-item">
        <span class="icon">❤️</span> HP: 
        <div class="hud-bar-bg">
          <div id="hud-hp-fill" style="width: 100%;"></div>
        </div>
        <span id="hud-hp-text">100</span>/100
      </div>
    </div>

    <div id="nametag-overlay-container"></div>

    <div id="joystick-zone"></div>

    <button id="jump-btn">ZIPLA</button>

    <div id="chat-container">
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Mesaj gönder..." autocomplete="off">
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
