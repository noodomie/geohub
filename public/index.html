<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoMultiplayer Sandbox</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-screen" class="overlay">
        <div class="login-box">
            <h1>GEOPLAY</h1>
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Kullanıcı Adı" minlength="3" maxlength="16" autocomplete="off">
            </div>
            <div class="color-picker-container">
                <span class="color-label">Karakter Rengi</span>
                <canvas id="color-wheel" width="150" height="150"></canvas>
            </div>
            <button id="play-button">Oyuna Katıl</button>
            <div id="error-message" class="error-msg"></div>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div id="ui-bar">
            <button id="btn-chat" class="ui-bar-btn" title="Sohbet">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
            </button>
        </div>

        <div id="chat-panel" class="side-panel closed">
            <div class="panel-header">
                <h3>Sohbet Odası</h3>
                <button id="chat-close" class="panel-close">&times;</button>
            </div>
            <div id="chat-messages"></div>
            <div class="panel-input-area">
                <input type="text" id="chat-input" placeholder="Mesaj yazın..." autocomplete="off">
                <button id="chat-send">Gönder</button>
            </div>
        </div>

        <div id="joystick-container">
            <div id="joystick-base">
                <div id="joystick-thumb"></div>
            </div>
        </div>

        <button id="jump-button">Zıpla</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <script src="game.js"></script>
</body>
</html>
